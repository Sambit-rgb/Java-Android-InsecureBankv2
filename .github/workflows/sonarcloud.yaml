name: Universal SonarCloud Analysis

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  pull-requests: read

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Detect project directory
      - name: Detect project directory
        run: |
          if [ -f "pom.xml" ] || [ -f "build.gradle" ] || [ -f "gradlew" ]; then
            echo "PROJECT_DIR=." >> $GITHUB_ENV
          else
            DIR=$(find . -maxdepth 2 -type f \( -name "pom.xml" -o -name "build.gradle" -o -name "gradlew" \) | head -n 1 | xargs dirname)
            echo "PROJECT_DIR=$DIR" >> $GITHUB_ENV
          fi
          echo "Detected project dir: $PROJECT_DIR"

      # ✅ Java 8 (safe for legacy projects)
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      # ✅ Detect build tool
      - name: Detect build tool
        run: |
          if [ -f "$PROJECT_DIR/gradlew" ]; then
            echo "BUILD_TOOL=gradle-wrapper" >> $GITHUB_ENV
          elif [ -f "$PROJECT_DIR/build.gradle" ]; then
            echo "BUILD_TOOL=gradle" >> $GITHUB_ENV
          elif [ -f "$PROJECT_DIR/pom.xml" ]; then
            echo "BUILD_TOOL=maven" >> $GITHUB_ENV
          else
            echo "BUILD_TOOL=none" >> $GITHUB_ENV
          fi
          echo "Detected build tool: $BUILD_TOOL"

      # ✅ Build (non-blocking)
      - name: Build project (safe mode)
        run: |
          cd $PROJECT_DIR

          if [ "$BUILD_TOOL" = "gradle-wrapper" ]; then
            chmod +x gradlew
            ./gradlew build --no-daemon || true

          elif [ "$BUILD_TOOL" = "gradle" ]; then
            sudo apt-get update && sudo apt-get install -y gradle
            gradle build || true

          elif [ "$BUILD_TOOL" = "maven" ]; then
            mvn clean install -DskipTests || true

          else
            echo "No build tool detected"
          fi

      # ✅ Detect binaries
      - name: Detect binaries
        run: |
          BIN_PATH=$(find $PROJECT_DIR -type d \( -path "*/build/classes*" -o -path "*/target/classes*" \) | head -n 1)
          
          if [ -z "$BIN_PATH" ]; then
            BIN_PATH="."
          fi

          echo "BINARIES=$BIN_PATH" >> $GITHUB_ENV
          echo "Detected binaries: $BIN_PATH"

      # ✅ SonarCloud analysis (FIXED)
      - name: Analyze with SonarCloud
        uses: SonarSource/sonarcloud-github-action@v2.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PROJECT_DIR: ${{ env.PROJECT_DIR }}
          BINARIES: ${{ env.BINARIES }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=${{ github.repository }}
            -Dsonar.organization=sambit-rgb
            -Dsonar.sources=$PROJECT_DIR
            -Dsonar.java.binaries=$BINARIES
            -Dsonar.verbose=true
