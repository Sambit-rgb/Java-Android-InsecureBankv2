name: SonarCloud analysis

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  pull-requests: read

jobs:
  Analysis:
    runs-on: ubuntu-latest

    steps:
      # ✅ Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Step 2: Use Java 8 (required for old Gradle)
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      # ✅ Step 3: Build Android project (inside subfolder)
      - name: Build Android project
        run: |
          cd InsecureBankv2
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # ✅ Step 4: SonarCloud analysis
      - name: Analyze with SonarCloud
        uses: SonarSource/sonarcloud-github-action@v2.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: InsecureBankv2
          args: >
            -Dsonar.projectKey=Sambit-rgb_Java-Android-InsecureBankv2
            -Dsonar.organization=sambit-rgb
            -Dsonar.sources=app/src/main/java
            -Dsonar.java.binaries=app/build/intermediates/javac/debug/classes
            -Dsonar.verbose=true
